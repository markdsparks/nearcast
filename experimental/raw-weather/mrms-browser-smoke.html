<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nearcast MRMS browser smoke</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    body { margin: 0; padding: 24px; background: #07111f; color: #eef6ff; }
    main { width: min(860px, 100%); margin: 0 auto; }
    button { border: 0; border-radius: 999px; padding: 10px 18px; font: inherit; font-weight: 700; }
    canvas { display: block; width: 100%; margin-top: 18px; border: 1px solid #263b50; border-radius: 18px; background: #10283d; image-rendering: auto; }
    pre { min-height: 110px; white-space: pre-wrap; color: #b9cce0; }
  </style>
</head>
<body>
  <main>
    <h1>Bounded MRMS browser decode</h1>
    <p>Lists recent public NOAA frames and renders the latest Maryville-area numeric texture entirely in a worker.</p>
    <button id="run" type="button">Run live smoke</button>
    <pre id="status">Ready.</pre>
    <canvas id="preview" width="640" height="400"></canvas>
  </main>
  <script src="./mrms-browser-adapter.js"></script>
  <script src="./mrms-browser-smoke.js"></script>
</body>
</html>
