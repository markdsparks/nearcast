name: Process pending radar generation plans

on:
  workflow_dispatch:
    inputs:
      uploadMode:
        description: Publish mode for the rendered artifact set.
        required: false
        default: dry-run
        type: choice
        options:
          - dry-run
          - r2
      publicBaseUrl:
        description: Public R2/custom-domain origin.
        required: false
        default: https://radar.getnearcast.app
      indexKey:
        description: Mutable preview index object key.
        required: false
        default: radar/mrms/on-demand-preview/index.json
      planOutputPrefix:
        description: Render output prefix to process.
        required: false
        default: radar/mrms/on-demand-preview
      maxPlanAgeMinutes:
        description: Skip private plans older than this; 0 disables the age guard.
        required: false
        default: "45"
      scanLimit:
        description: Maximum private plan objects to scan.
        required: false
        default: "1000"
      verifyPublic:
        description: Verify the uploaded pack through the public origin.
        required: false
        default: true
        type: boolean
      allowEmptyPublish:
        description: Allow r2 publish when the render produced zero radar tiles.
        required: false
        default: false
        type: boolean
      markDryRunProcessed:
        description: Mark a dry-run plan as processed.
        required: false
        default: false
        type: boolean
      sample:
        description: Mark generated output as sample data.
        required: false
        default: false
        type: boolean
      maxPacks:
        description: Maximum packs to keep in the merged preview index.
        required: false
        default: "80"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: process-pending-radar-generation-plans
  cancel-in-progress: false

jobs:
  process-pending:
    if: ${{ github.event_name != 'schedule' || vars.ENABLE_RADAR_GENERATION_RUNNER == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RADAR_GENERATION_R2_BUCKET: ${{ vars.RADAR_GENERATION_R2_BUCKET || vars.MRMS_R2_BUCKET || 'nearcast-radar' }}
      RADAR_GENERATION_STATE_R2_BUCKET: ${{ vars.RADAR_GENERATION_STATE_R2_BUCKET || 'nearcast-radar-state' }}
      RADAR_GENERATION_R2_ENDPOINT: ${{ vars.RADAR_GENERATION_R2_ENDPOINT || vars.MRMS_R2_ENDPOINT || '' }}
      RADAR_GENERATION_R2_UPLOAD_CONCURRENCY: ${{ vars.RADAR_GENERATION_R2_UPLOAD_CONCURRENCY || vars.MRMS_R2_UPLOAD_CONCURRENCY || '4' }}
      RADAR_GENERATION_PLANS_R2_PREFIX: ${{ vars.RADAR_GENERATION_PLANS_R2_PREFIX || 'radar/mrms/plans' }}
      RADAR_GENERATION_PROCESSED_PLANS_R2_PREFIX: ${{ vars.RADAR_GENERATION_PROCESSED_PLANS_R2_PREFIX || 'radar/mrms/processed-plans' }}
      UPLOAD_MODE: ${{ github.event.inputs.uploadMode || vars.RADAR_GENERATION_RUNNER_UPLOAD_MODE || 'r2' }}
      PUBLIC_BASE_URL: ${{ github.event.inputs.publicBaseUrl || vars.RADAR_GENERATION_PUBLIC_BASE_URL || 'https://radar.getnearcast.app' }}
      INDEX_KEY: ${{ github.event.inputs.indexKey || vars.RADAR_GENERATION_INDEX_KEY || 'radar/mrms/on-demand-preview/index.json' }}
      PLAN_OUTPUT_PREFIX: ${{ github.event.inputs.planOutputPrefix || vars.RADAR_GENERATION_OUTPUT_PREFIX || 'radar/mrms/on-demand-preview' }}
      MAX_PLAN_AGE_MINUTES: ${{ github.event.inputs.maxPlanAgeMinutes || vars.RADAR_GENERATION_RUNNER_MAX_PLAN_AGE_MINUTES || '45' }}
      SCAN_LIMIT: ${{ github.event.inputs.scanLimit || vars.RADAR_GENERATION_RUNNER_SCAN_LIMIT || '1000' }}
      VERIFY_PUBLIC: ${{ github.event.inputs.verifyPublic || vars.RADAR_GENERATION_RUNNER_VERIFY_PUBLIC || 'true' }}
      ALLOW_EMPTY_PUBLISH: ${{ github.event.inputs.allowEmptyPublish || vars.RADAR_GENERATION_RUNNER_ALLOW_EMPTY_PUBLISH || 'false' }}
      MARK_DRY_RUN_PROCESSED: ${{ github.event.inputs.markDryRunProcessed || vars.RADAR_GENERATION_RUNNER_MARK_DRY_RUN_PROCESSED || 'false' }}
      SAMPLE: ${{ github.event.inputs.sample || 'false' }}
      MAX_PACKS: ${{ github.event.inputs.maxPacks || vars.RADAR_GENERATION_RUNNER_MAX_PACKS || '80' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install R2 dependency
        run: npm install --no-save --no-package-lock --no-audit --no-fund @aws-sdk/client-s3

      - name: Select pending private render plan
        id: select
        run: |
          set -euo pipefail
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY secrets are required."
            exit 1
          fi
          ENDPOINT="$RADAR_GENERATION_R2_ENDPOINT"
          if [ -z "$ENDPOINT" ]; then
            if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
              echo "CLOUDFLARE_ACCOUNT_ID or RADAR_GENERATION_R2_ENDPOINT is required."
              exit 1
            fi
            ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi
          node scripts/radar-generation-plan-queue.mjs select \
            --bucket="$RADAR_GENERATION_STATE_R2_BUCKET" \
            --endpoint="$ENDPOINT" \
            --access-key-id="$R2_ACCESS_KEY_ID" \
            --secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --plan-store-prefix="$RADAR_GENERATION_PLANS_R2_PREFIX" \
            --plan-output-prefix="$PLAN_OUTPUT_PREFIX" \
            --processed-prefix="$RADAR_GENERATION_PROCESSED_PLANS_R2_PREFIX" \
            --scan-limit="$SCAN_LIMIT" \
            --max-age-minutes="$MAX_PLAN_AGE_MINUTES" \
            --plan-out=/tmp/radar-generation-plan.json \
            --selection-out=/tmp/radar-generation-plan-selection.json
          SELECTED=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('/tmp/radar-generation-plan-selection.json','utf8')); process.stdout.write(s.selected ? 'true' : 'false');")
          echo "selected=$SELECTED" >> "$GITHUB_OUTPUT"

      - name: Print selected plan summary
        if: ${{ steps.select.outputs.selected == 'true' }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const selection = JSON.parse(fs.readFileSync("/tmp/radar-generation-plan-selection.json", "utf8"));
          const plan = JSON.parse(fs.readFileSync("/tmp/radar-generation-plan.json", "utf8"));
          console.log(JSON.stringify({
            objectPath: selection.objectPath,
            markerKey: selection.markerKey,
            requestId: plan.requestId,
            dedupeKey: plan.dedupeKey,
            reason: plan.reason,
            planKey: plan.output?.planKey,
            outputPrefix: plan.output?.prefixTemplate,
            tileBounds: plan.coverage?.tileBounds,
            candidateTiles: plan.coverage?.candidateTiles,
            tileZooms: plan.render?.tileZooms,
            ttlMinutes: plan.render?.ttlMinutes
          }, null, 2));
          NODE

      - name: No pending private plans
        if: ${{ steps.select.outputs.selected != 'true' }}
        run: |
          node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('/tmp/radar-generation-plan-selection.json','utf8')); console.log(JSON.stringify({selected:false, scanned:s.scanned, candidates:s.candidates, skipped:s.skipped || []}, null, 2));"

      - name: Render radar artifacts from plan
        if: ${{ steps.select.outputs.selected == 'true' }}
        run: |
          set -euo pipefail
          ARGS=(
            scripts/radar-generation-renderer.mjs
            --plan=/tmp/radar-generation-plan.json
            --artifact-root=/tmp/nearcast-radar-generation-artifacts
            --public-base-url="$PUBLIC_BASE_URL"
          )
          if [ "$SAMPLE" = "true" ]; then
            ARGS+=(--sample)
          fi
          node "${ARGS[@]}" > /tmp/radar-generation-result.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const result = JSON.parse(fs.readFileSync("/tmp/radar-generation-result.json", "utf8"));
          const metrics = result.pack?.metrics || {};
          const counts = ["dataTiles", "radarTiles", "generatedTiles"]
            .map((key) => Number(metrics[key]))
            .filter(Number.isFinite);
          const renderedTiles = counts.length ? Math.max(...counts) : 0;
          fs.writeFileSync("/tmp/radar-generation-rendered-tile-count.txt", String(renderedTiles));
          console.log(JSON.stringify({
            state: result.state,
            sourceSignature: result.sourceSignature,
            packId: result.pack?.id,
            manifestKey: result.materialized?.manifestKey,
            indexPackKey: result.materialized?.indexPackKey,
            generatedTiles: metrics.generatedTiles,
            radarTiles: metrics.radarTiles,
            dataTiles: metrics.dataTiles,
            candidateTiles: metrics.candidateTiles
          }, null, 2));
          NODE

      - name: Decide publish eligibility
        id: tile_guard
        if: ${{ steps.select.outputs.selected == 'true' }}
        run: |
          set -euo pipefail
          TILE_COUNT="$(cat /tmp/radar-generation-rendered-tile-count.txt)"
          if [ "$UPLOAD_MODE" = "r2" ] && [ "$ALLOW_EMPTY_PUBLISH" != "true" ] && [ "$TILE_COUNT" -le 0 ]; then
            echo "Render produced zero radar tiles. Marking this plan skipped-empty instead of publishing."
            ENDPOINT="$RADAR_GENERATION_R2_ENDPOINT"
            if [ -z "$ENDPOINT" ]; then
              ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
            fi
            node scripts/radar-generation-plan-queue.mjs mark \
              --bucket="$RADAR_GENERATION_STATE_R2_BUCKET" \
              --endpoint="$ENDPOINT" \
              --access-key-id="$R2_ACCESS_KEY_ID" \
              --secret-access-key="$R2_SECRET_ACCESS_KEY" \
              --selection=/tmp/radar-generation-plan-selection.json \
              --render-result=/tmp/radar-generation-result.json \
              --status=skipped-empty
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "marked=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Rendered tile count guard passed: $TILE_COUNT"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "marked=false" >> "$GITHUB_OUTPUT"

      - name: Load current preview index
        if: ${{ steps.select.outputs.selected == 'true' && steps.tile_guard.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          INDEX_URL="${PUBLIC_BASE_URL%/}/${INDEX_KEY#/}"
          CURRENT_INDEX="/tmp/radar-generation-current-index.json"
          rm -f "$CURRENT_INDEX"
          if curl --fail --silent --show-error --location "$INDEX_URL" --output "$CURRENT_INDEX"; then
            node -e "const fs=require('fs'); const i=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); console.log(JSON.stringify({currentPacks:i.packs?.length||0, expiresAt:i.expiresAt||''}, null, 2));" "$CURRENT_INDEX"
          else
            echo "No current preview index found at $INDEX_URL; publishing will create a fresh index."
          fi

      - name: Plan publish
        id: plan_publish
        if: ${{ steps.select.outputs.selected == 'true' && steps.tile_guard.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          node scripts/radar-generation-publisher.mjs \
            --render-result=/tmp/radar-generation-result.json \
            --current-index=/tmp/radar-generation-current-index.json \
            --index-out=/tmp/nearcast-radar-generation-index/"$INDEX_KEY" \
            --index-key="$INDEX_KEY" \
            --upload-mode=dry-run \
            --max-packs="$MAX_PACKS" \
            --public-base-url="$PUBLIC_BASE_URL" \
            > /tmp/radar-generation-publication-plan.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const publication = JSON.parse(fs.readFileSync("/tmp/radar-generation-publication-plan.json", "utf8"));
          console.log(JSON.stringify({
            uploadMode: publication.uploadMode,
            packId: publication.packId,
            objectCount: publication.objectCount,
            bytes: publication.bytes,
            indexKey: publication.indexKey,
            sourceSignature: publication.sourceSignature,
            sampleKeys: publication.upload?.sampleKeys || []
          }, null, 2));
          NODE

      - name: Configure R2 CORS for browser preview
        if: ${{ steps.select.outputs.selected == 'true' && steps.tile_guard.outputs.publish == 'true' && env.UPLOAD_MODE == 'r2' }}
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping R2 CORS configuration because CLOUDFLARE_API_TOKEN is not set."
            exit 0
          fi
          if [ -z "$RADAR_GENERATION_R2_BUCKET" ]; then
            echo "RADAR_GENERATION_R2_BUCKET or MRMS_R2_BUCKET is required."
            exit 1
          fi
          npx --yes wrangler r2 bucket cors set "$RADAR_GENERATION_R2_BUCKET" \
            --file config/radar-r2-cors.json

      - name: Upload radar artifacts to R2
        id: upload
        if: ${{ steps.select.outputs.selected == 'true' && steps.tile_guard.outputs.publish == 'true' && env.UPLOAD_MODE == 'r2' }}
        run: |
          set -euo pipefail
          if [ -z "$RADAR_GENERATION_R2_BUCKET" ]; then
            echo "RADAR_GENERATION_R2_BUCKET or MRMS_R2_BUCKET is required."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && [ -z "$RADAR_GENERATION_R2_ENDPOINT" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID or RADAR_GENERATION_R2_ENDPOINT is required."
            exit 1
          fi
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY secrets are required."
            exit 1
          fi
          ENDPOINT="$RADAR_GENERATION_R2_ENDPOINT"
          if [ -z "$ENDPOINT" ]; then
            ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi
          node scripts/radar-generation-publisher.mjs \
            --render-result=/tmp/radar-generation-result.json \
            --current-index=/tmp/radar-generation-current-index.json \
            --index-out=/tmp/nearcast-radar-generation-index/"$INDEX_KEY" \
            --index-key="$INDEX_KEY" \
            --upload-mode=r2 \
            --bucket="$RADAR_GENERATION_R2_BUCKET" \
            --endpoint="$ENDPOINT" \
            --access-key-id="$R2_ACCESS_KEY_ID" \
            --secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --concurrency="$RADAR_GENERATION_R2_UPLOAD_CONCURRENCY" \
            --max-packs="$MAX_PACKS" \
            --public-base-url="$PUBLIC_BASE_URL" \
            > /tmp/radar-generation-publication.json

      - name: Verify public radar artifacts
        id: verify
        if: ${{ steps.select.outputs.selected == 'true' && steps.tile_guard.outputs.publish == 'true' && env.UPLOAD_MODE == 'r2' && env.VERIFY_PUBLIC == 'true' }}
        run: |
          set -euo pipefail
          INDEX_URL="${PUBLIC_BASE_URL%/}/${INDEX_KEY#/}"
          PACK_ID=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('/tmp/radar-generation-result.json','utf8')); if(!r.pack?.id) process.exit(1); process.stdout.write(r.pack.id);")
          node scripts/mrms-prototype/verify-mrms-public-tiles.mjs \
            --index="$INDEX_URL" \
            --pack-id="$PACK_ID" \
            --max-probes=96 \
            --timeout=3000

      - name: Mark selected plan processed
        if: ${{ steps.select.outputs.selected == 'true' && steps.tile_guard.outputs.publish == 'true' && steps.tile_guard.outputs.marked != 'true' && ((env.UPLOAD_MODE == 'r2' && steps.upload.outcome == 'success' && (steps.verify.outcome == 'success' || steps.verify.outcome == 'skipped')) || (env.UPLOAD_MODE == 'dry-run' && env.MARK_DRY_RUN_PROCESSED == 'true' && steps.plan_publish.outcome == 'success')) }}
        run: |
          set -euo pipefail
          ENDPOINT="$RADAR_GENERATION_R2_ENDPOINT"
          if [ -z "$ENDPOINT" ]; then
            ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi
          STATUS=published
          PUBLICATION=/tmp/radar-generation-publication.json
          if [ "$UPLOAD_MODE" = "dry-run" ]; then
            STATUS=dry-run
            PUBLICATION=/tmp/radar-generation-publication-plan.json
          fi
          node scripts/radar-generation-plan-queue.mjs mark \
            --bucket="$RADAR_GENERATION_STATE_R2_BUCKET" \
            --endpoint="$ENDPOINT" \
            --access-key-id="$R2_ACCESS_KEY_ID" \
            --secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --selection=/tmp/radar-generation-plan-selection.json \
            --render-result=/tmp/radar-generation-result.json \
            --publication="$PUBLICATION" \
            --status="$STATUS"

      - name: Print final summary
        if: always()
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const read = (file) => fs.existsSync(file)
            ? JSON.parse(fs.readFileSync(file, "utf8"))
            : null;
          const selection = read("/tmp/radar-generation-plan-selection.json");
          const result = read("/tmp/radar-generation-result.json");
          const publication = read("/tmp/radar-generation-publication.json")
            || read("/tmp/radar-generation-publication-plan.json");
          const indexUrl = `${process.env.PUBLIC_BASE_URL.replace(/\/+$/g, "")}/${process.env.INDEX_KEY.replace(/^\/+/g, "")}`;
          console.log(JSON.stringify({
            selected: Boolean(selection?.selected),
            objectPath: selection?.objectPath || "",
            markerKey: selection?.markerKey || "",
            requestId: result?.requestId || selection?.requestId || "",
            packId: result?.pack?.id || publication?.packId || "",
            uploadMode: publication?.uploadMode || process.env.UPLOAD_MODE,
            uploaded: publication?.upload?.uploaded ?? 0,
            objectCount: publication?.objectCount ?? 0,
            bytes: publication?.bytes ?? 0,
            indexUrl,
            manifestUrl: result?.pack?.manifestUrl || ""
          }, null, 2));
          NODE

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pending-radar-generation-plan-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 3
          path: |
            /tmp/radar-generation-plan-selection.json
            /tmp/radar-generation-plan.json
            /tmp/radar-generation-result.json
            /tmp/radar-generation-publication-plan.json
            /tmp/radar-generation-publication.json
