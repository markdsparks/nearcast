name: Deploy Cloudflare app

on:
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-app
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN secret."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret."
            exit 1
          fi

      - name: Ensure radar generation preview queue
        run: |
          if npx --yes wrangler queues list | grep -q 'nearcast-radar-generation-preview'; then
            echo "Queue already exists."
          else
            npx --yes wrangler queues create nearcast-radar-generation-preview
          fi

      - name: Ensure private radar generation state bucket
        run: |
          if npx --yes wrangler r2 bucket list | grep -q 'nearcast-radar-state'; then
            echo "State bucket already exists."
          else
            npx --yes wrangler r2 bucket create nearcast-radar-state
          fi

      - name: Ensure private plan watch state bucket
        run: |
          if npx --yes wrangler r2 bucket list | grep -q 'nearcast-plan-watch-state'; then
            echo "Plan watch bucket already exists."
          else
            npx --yes wrangler r2 bucket create nearcast-plan-watch-state
          fi

      - name: Remove public preview request-state objects
        run: |
          npx --yes wrangler r2 object delete 'nearcast-radar/radar/mrms/request-state/radar-generation:v1:auto:radar:35.00:-90.00:z10.json' --remote --force || true
          npx --yes wrangler r2 object delete 'nearcast-radar/radar/mrms/request-state/radar-generation-budget:v1:global:all:495215.json' --remote --force || true
          npx --yes wrangler r2 object delete 'nearcast-radar/radar/mrms/request-state/radar-generation-budget:v1:viewport:radar-generation:v1:auto:radar:35.00:-90.00:z10:495215.json' --remote --force || true

      - name: Deploy app and radar capability Worker
        run: npx --yes wrangler deploy

      - name: Refresh plan watch Worker secrets
        continue-on-error: true
        env:
          PLAN_WATCH_VAPID_PRIVATE_KEY: ${{ secrets.PLAN_WATCH_VAPID_PRIVATE_KEY }}
          PLAN_WATCH_TEST_TOKEN: ${{ secrets.PLAN_WATCH_TEST_TOKEN }}
          XWEATHER_CLIENT_ID: ${{ secrets.XWEATHER_CLIENT_ID }}
          XWEATHER_CLIENT_SECRET: ${{ secrets.XWEATHER_CLIENT_SECRET }}
        run: |
          if [ -n "$PLAN_WATCH_VAPID_PRIVATE_KEY" ]; then
            printf '%s' "$PLAN_WATCH_VAPID_PRIVATE_KEY" | npx --yes wrangler secret put PLAN_WATCH_VAPID_PRIVATE_KEY
          else
            echo "Skipping PLAN_WATCH_VAPID_PRIVATE_KEY because the GitHub secret is not set."
          fi
          if [ -n "$PLAN_WATCH_TEST_TOKEN" ]; then
            printf '%s' "$PLAN_WATCH_TEST_TOKEN" | npx --yes wrangler secret put PLAN_WATCH_TEST_TOKEN
          else
            echo "Skipping PLAN_WATCH_TEST_TOKEN because the GitHub secret is not set."
          fi
          if [ -n "$XWEATHER_CLIENT_ID" ]; then
            printf '%s' "$XWEATHER_CLIENT_ID" | npx --yes wrangler secret put XWEATHER_CLIENT_ID
          else
            echo "Skipping XWEATHER_CLIENT_ID because the GitHub secret is not set."
          fi
          if [ -n "$XWEATHER_CLIENT_SECRET" ]; then
            printf '%s' "$XWEATHER_CLIENT_SECRET" | npx --yes wrangler secret put XWEATHER_CLIENT_SECRET
          else
            echo "Skipping XWEATHER_CLIENT_SECRET because the GitHub secret is not set."
          fi

      - name: Purge app edge cache
        env:
          CLOUDFLARE_ZONE_NAME: getnearcast.app
        run: |
          if ! ZONE_ID=$(node -e 'const token=process.env.CLOUDFLARE_API_TOKEN; const name=process.env.CLOUDFLARE_ZONE_NAME; fetch(`https://api.cloudflare.com/client/v4/zones?name=${encodeURIComponent(name)}`, { headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" } }).then((response) => response.json()).then((body) => { const id = body?.result?.[0]?.id; if (!body?.success || !id) { console.error(JSON.stringify(body)); process.exit(1); } process.stdout.write(id); }).catch((error) => { console.error(error); process.exit(1); });'); then
            echo "Skipping app edge cache purge because the Cloudflare token cannot read the zone."
            exit 0
          fi
          if ! curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'; then
            echo "Skipping app edge cache purge because the Cloudflare token cannot purge the zone."
          fi
