name: Evaluate notification rules

on:
  workflow_dispatch:
    inputs:
      subscriptionId:
        description: "Optional dedicated test subscription. Required for a send-enabled run."
        required: false
        type: string
      dryRun:
        description: "Check plans without sending a push."
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PLAN_WATCH_TEST_TOKEN: ${{ secrets.PLAN_WATCH_TEST_TOKEN }}
      PLAN_WATCH_EVALUATE_ENDPOINT: https://getnearcast.app/api/watch/notifications/evaluate
      SUBSCRIPTION_ID: ${{ inputs.subscriptionId }}
      DRY_RUN: ${{ inputs.dryRun }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify evaluator token
        run: |
          if [ -z "$PLAN_WATCH_TEST_TOKEN" ]; then
            echo "Missing PLAN_WATCH_TEST_TOKEN secret."
            exit 1
          fi
          if [ "$DRY_RUN" != "true" ] && [ -z "$SUBSCRIPTION_ID" ]; then
            echo "A send-enabled evaluation requires an explicit dedicated test subscription id."
            exit 1
          fi
          if [ -n "$SUBSCRIPTION_ID" ]; then
            echo "::add-mask::$SUBSCRIPTION_ID"
          fi

      - name: Evaluate watched plans
        run: |
          request_body="$(node -e 'const id = String(process.env.SUBSCRIPTION_ID || "").trim(); const dryRun = String(process.env.DRY_RUN || "").toLowerCase() === "true"; process.stdout.write(JSON.stringify({ ...(id ? { subscriptionId: id } : {}), dryRun }));')"
          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST "$PLAN_WATCH_EVALUATE_ENDPOINT" \
            -H "Authorization: Bearer $PLAN_WATCH_TEST_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$request_body")"

          echo "HTTP $status"
          RESPONSE_FILE="$response_file" node <<'NODE'
          const fs = require("node:fs");
          const body = JSON.parse(fs.readFileSync(process.env.RESPONSE_FILE, "utf8"));
          const summary = {};
          for (const key of ["ok", "state", "reason", "dryRun", "checkedAt", "subscriptions", "plans", "places", "candidates", "sent", "skipped", "failed", "deferred", "updated", "errors"]) {
            if (body[key] !== undefined) summary[key] = body[key];
          }
          process.stdout.write(`${JSON.stringify(summary, null, 2)}\n`);
          NODE

          STATUS="$status" RESPONSE_FILE="$response_file" node <<'NODE'
          const fs = require("node:fs");
          const status = Number(process.env.STATUS);
          const text = fs.readFileSync(process.env.RESPONSE_FILE, "utf8");
          let body = {};
          try {
            body = JSON.parse(text);
          } catch {
            body = {};
          }
          if (status < 200 || status >= 300 || body.ok !== true) {
            const reason = body.error || body.state || `http-${status}`;
            console.error(`Plan watch evaluator failed: ${reason}`);
            process.exit(1);
          }
          NODE
