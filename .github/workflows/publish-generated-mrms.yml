name: Publish generated MRMS radar

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Coverage profile or comma-separated profiles
        required: false
        default: metro-east
      frames:
        description: Number of recent MRMS frames
        required: false
        default: "6"
      ttlMinutes:
        description: Manifest freshness window
        required: false
        default: "120"
      tileZooms:
        description: Generated source zooms
        required: false
        default: "6,7,8,9,10,11,12,13"
      forcePublish:
        description: Regenerate and deploy even when the current radar source is fresh
        required: false
        default: "false"
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: publish-generated-mrms
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_MRMS_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      MRMS_PROFILES: ${{ github.event.inputs.profile || vars.MRMS_PROFILES || vars.MRMS_PROFILE || 'metro-east' }}
      MRMS_FRAMES: ${{ github.event.inputs.frames || '6' }}
      MRMS_TTL_MINUTES: ${{ github.event.inputs.ttlMinutes || vars.MRMS_TTL_MINUTES || '120' }}
      MRMS_TILE_ZOOMS: ${{ github.event.inputs.tileZooms || vars.MRMS_TILE_ZOOMS || '6,7,8,9,10,11,12,13' }}
      MRMS_CURRENT_MANIFEST_URL: ${{ vars.MRMS_CURRENT_MANIFEST_URL || 'https://getnearcast.app/radar/mrms/manifest.json' }}
      MRMS_SKIP_EMPTY_TILES: ${{ vars.MRMS_SKIP_EMPTY_TILES || 'true' }}
      MRMS_ENCODED_TILES: ${{ vars.MRMS_ENCODED_TILES || 'true' }}
      MRMS_ASSET_FILE_LIMIT: ${{ vars.MRMS_ASSET_FILE_LIMIT || '19500' }}
      MRMS_TILE_UPLOAD_MODE: ${{ vars.MRMS_TILE_UPLOAD_MODE || 'static' }}
      MRMS_TILE_URL_BASE: ${{ vars.MRMS_TILE_URL_BASE || '' }}
      MRMS_R2_BUCKET: ${{ vars.MRMS_R2_BUCKET || '' }}
      MRMS_R2_PREFIX: ${{ vars.MRMS_R2_PREFIX || 'mrms' }}
      MRMS_R2_ENDPOINT: ${{ vars.MRMS_R2_ENDPOINT || '' }}
      MRMS_R2_CACHE_CONTROL: ${{ vars.MRMS_R2_CACHE_CONTROL || 'public, max-age=86400, immutable' }}
      MRMS_R2_UPLOAD_CONCURRENCY: ${{ vars.MRMS_R2_UPLOAD_CONCURRENCY || '24' }}
      MRMS_R2_PRUNE_OLDER_THAN_MINUTES: ${{ vars.MRMS_R2_PRUNE_OLDER_THAN_MINUTES || '360' }}
      MRMS_PUBLIC_TILE_VERIFY_MODE: ${{ vars.MRMS_PUBLIC_TILE_VERIFY_MODE || 'warn' }}
      MRMS_FORCE_PUBLISH: ${{ github.event.inputs.forcePublish || 'false' }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate live MRMS radar tiles
        id: publish
        run: |
          EXTRA_ARGS=()
          if [ "$MRMS_SKIP_EMPTY_TILES" != "false" ]; then
            EXTRA_ARGS+=(--skip-empty-tiles)
          fi
          if [ "$MRMS_ENCODED_TILES" != "false" ]; then
            EXTRA_ARGS+=(--encoded-tiles)
          fi
          if [ "$MRMS_TILE_UPLOAD_MODE" = "r2" ]; then
            if [ -z "$MRMS_TILE_URL_BASE" ]; then
              echo "MRMS_TILE_URL_BASE is required when MRMS_TILE_UPLOAD_MODE=r2."
              exit 1
            fi
            EXTRA_ARGS+=(--tile-url-base="$MRMS_TILE_URL_BASE")
          fi
          if [ "$MRMS_FORCE_PUBLISH" = "true" ]; then
            EXTRA_ARGS+=(--force-publish)
          fi
          node scripts/mrms-prototype/publish-mrms-live.mjs \
            --profiles="$MRMS_PROFILES" \
            --frames="$MRMS_FRAMES" \
            --ttl-minutes="$MRMS_TTL_MINUTES" \
            --tile-zooms="$MRMS_TILE_ZOOMS" \
            --current-manifest-url="$MRMS_CURRENT_MANIFEST_URL" \
            --summary-out=/tmp/nearcast-mrms-publish-summary.json \
            "${EXTRA_ARGS[@]}"
          SKIPPED=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('/tmp/nearcast-mrms-publish-summary.json','utf8')); process.stdout.write(s.skipped ? 'true' : 'false');")
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

      - name: Skip deploy when radar source is unchanged
        if: steps.publish.outputs.skipped == 'true'
        run: echo "MRMS source and render profile are unchanged; keeping current deployed radar manifest."

      - name: Verify generated manifest
        if: steps.publish.outputs.skipped != 'true'
        run: |
          node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('radar/mrms/manifest.json','utf8')); const i=JSON.parse(fs.readFileSync('radar/mrms/index.json','utf8')); if(m.provider!=='mrms-generated'||!m.frames?.length||!m.coverageBounds||!m.expiresAt||i.provider!=='nearcast-generated-radar-index'||!i.packs?.length) process.exit(1); console.log(JSON.stringify({frames:m.frames.length, packs:i.packs.length, coverage:m.coverageBounds, expiresAt:m.expiresAt, dataTiles:m.coverage?.dataTiles||0, dataUrl:Boolean(m.frames[0]?.dataUrl)}, null, 2));"

      - name: Install R2 upload dependencies
        if: steps.publish.outputs.skipped != 'true' && env.MRMS_TILE_UPLOAD_MODE == 'r2'
        run: npm install --no-save --no-package-lock --no-audit --no-fund @aws-sdk/client-s3

      - name: Upload generated radar tiles to R2
        if: steps.publish.outputs.skipped != 'true' && env.MRMS_TILE_UPLOAD_MODE == 'r2'
        run: |
          if [ -z "$MRMS_R2_BUCKET" ]; then
            echo "MRMS_R2_BUCKET is required when MRMS_TILE_UPLOAD_MODE=r2."
            exit 1
          fi
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY secrets are required when MRMS_TILE_UPLOAD_MODE=r2."
            exit 1
          fi
          ENDPOINT="$MRMS_R2_ENDPOINT"
          if [ -z "$ENDPOINT" ]; then
            ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi
          node scripts/mrms-prototype/upload-mrms-r2.mjs \
            --dir=radar/mrms/live \
            --bucket="$MRMS_R2_BUCKET" \
            --prefix="$MRMS_R2_PREFIX" \
            --endpoint="$ENDPOINT" \
            --access-key-id="$R2_ACCESS_KEY_ID" \
            --secret-access-key="$R2_SECRET_ACCESS_KEY" \
            --cache-control="$MRMS_R2_CACHE_CONTROL" \
            --concurrency="$MRMS_R2_UPLOAD_CONCURRENCY" \
            --prune-older-than-minutes="$MRMS_R2_PRUNE_OLDER_THAN_MINUTES" \
            --delete-local

      - name: Verify generated radar tiles are public
        if: steps.publish.outputs.skipped != 'true' && env.MRMS_TILE_UPLOAD_MODE == 'r2'
        run: |
          if node scripts/mrms-prototype/verify-mrms-public-tiles.mjs --manifest=radar/mrms/manifest.json; then
            exit 0
          fi
          if [ "$MRMS_PUBLIC_TILE_VERIFY_MODE" = "strict" ]; then
            exit 1
          fi
          echo "::warning::Generated MRMS public tile verification failed; continuing because MRMS_PUBLIC_TILE_VERIFY_MODE=$MRMS_PUBLIC_TILE_VERIFY_MODE."

      - name: Remove R2 upload dependencies
        if: always() && env.MRMS_TILE_UPLOAD_MODE == 'r2'
        run: rm -rf node_modules

      - name: Verify generated asset budget
        if: steps.publish.outputs.skipped != 'true'
        run: |
          node scripts/mrms-prototype/check-mrms-asset-budget.mjs --limit="$MRMS_ASSET_FILE_LIMIT"

      - name: Deploy static assets with generated radar
        if: steps.publish.outputs.skipped != 'true'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN secret."
            exit 1
          fi
          npx --yes wrangler deploy
