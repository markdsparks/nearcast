name: Send notification delivery canary

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Delivery channel to verify. Configure its canary subscription secret first."
        required: true
        default: web-push
        type: choice
        options:
          - web-push
          - apns
      subscriptionId:
        description: "Optional explicit canary subscription id. Overrides the configured channel secret."
        required: false
        type: string

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PLAN_WATCH_TEST_TOKEN: ${{ secrets.PLAN_WATCH_TEST_TOKEN }}
      PLAN_WATCH_TEST_ENDPOINT: https://getnearcast.app/api/watch/notifications/test
      EXPLICIT_SUBSCRIPTION_ID: ${{ inputs.subscriptionId }}
      DELIVERY_CHANNEL: ${{ inputs.channel }}
      WEB_PUSH_CANARY_SUBSCRIPTION_ID: ${{ secrets.PLAN_WATCH_WEB_PUSH_CANARY_SUBSCRIPTION_ID }}
      APNS_CANARY_SUBSCRIPTION_ID: ${{ secrets.PLAN_WATCH_APNS_CANARY_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify smoke token
        run: |
          if [ -z "$PLAN_WATCH_TEST_TOKEN" ]; then
            echo "Missing PLAN_WATCH_TEST_TOKEN secret."
            exit 1
          fi

      - name: Select a dedicated canary device
        run: |
          subscription_id="$EXPLICIT_SUBSCRIPTION_ID"
          if [ -z "$subscription_id" ] && [ "$DELIVERY_CHANNEL" = "web-push" ]; then
            subscription_id="$WEB_PUSH_CANARY_SUBSCRIPTION_ID"
          fi
          if [ -z "$subscription_id" ] && [ "$DELIVERY_CHANNEL" = "apns" ]; then
            subscription_id="$APNS_CANARY_SUBSCRIPTION_ID"
          fi
          if [ -z "$subscription_id" ]; then
            echo "Missing a dedicated $DELIVERY_CHANNEL canary subscription id."
            exit 1
          fi
          echo "::add-mask::$subscription_id"
          echo "SUBSCRIPTION_ID=$subscription_id" >> "$GITHUB_ENV"

      - name: Send test notification
        run: |
          request_body="$(node -e 'const id = String(process.env.SUBSCRIPTION_ID || "").trim(); const channel = String(process.env.DELIVERY_CHANNEL || "delivery"); process.stdout.write(JSON.stringify({ subscriptionId: id, notification: { title: "Nearcast delivery test", body: `${channel} canary accepted. No action is needed.`, tag: `nearcast-${channel}-canary`, renotify: false, target: "watching", source: "production-delivery-canary" } }));')"
          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST "$PLAN_WATCH_TEST_ENDPOINT" \
            -H "Authorization: Bearer $PLAN_WATCH_TEST_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$request_body")"

          echo "HTTP $status"
          RESPONSE_FILE="$response_file" node -e 'const fs=require("node:fs"); const body=JSON.parse(fs.readFileSync(process.env.RESPONSE_FILE,"utf8")); delete body.subscriptionId; process.stdout.write(`${JSON.stringify(body, null, 2)}\n`);'

          STATUS="$status" RESPONSE_FILE="$response_file" node <<'NODE'
          const fs = require("node:fs");
          const status = Number(process.env.STATUS);
          const text = fs.readFileSync(process.env.RESPONSE_FILE, "utf8");
          let body = {};
          try {
            body = JSON.parse(text);
          } catch {
            body = {};
          }
          if (status < 200 || status >= 300 || body.ok !== true) {
            const reason = body.error || body.state || `http-${status}`;
            console.error(`Notification delivery canary failed: ${reason}`);
            process.exit(1);
          }
          NODE

          echo "PASS $DELIVERY_CHANNEL delivery canary was accepted by its provider."
