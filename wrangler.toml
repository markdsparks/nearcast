name = "nearcast"
main = "workers/radar-capability.mjs"
compatibility_date = "2026-06-22"

[assets]
directory = "."

[[r2_buckets]]
binding = "RADAR_GENERATION_REQUESTS_R2"
bucket_name = "nearcast-radar-state"

[[r2_buckets]]
binding = "RADAR_GENERATION_PLANS_R2"
bucket_name = "nearcast-radar-state"

[[queues.producers]]
binding = "RADAR_GENERATION_QUEUE"
queue = "nearcast-radar-generation-preview"

[[queues.consumers]]
queue = "nearcast-radar-generation-preview"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2

[vars]
RADAR_FRAME_INDEX_URL = "https://radar.getnearcast.app/radar/mrms/frame-substrate/latest-frame-index.json"
RADAR_GENERATION_INDEX_URL = "https://radar.getnearcast.app/radar/mrms/on-demand-preview/index.json"
RADAR_GENERATION_REQUESTS_R2_PREFIX = "radar/mrms/request-state"
RADAR_GENERATION_PLANS_R2_PREFIX = "radar/mrms/plans"
RADAR_GENERATION_PENDING_PLANS_R2_PREFIX = "radar/mrms/pending-plans"
RADAR_GENERATION_OUTPUT_PREFIX = "radar/mrms/on-demand-preview"
RADAR_GENERATION_TILE_ZOOMS = "8,9,10,11,12"
RADAR_GENERATION_ACCEPT_REQUESTS = "safe"
RADAR_GENERATION_RUNNER_MODE = "safe"
RADAR_GENERATION_POLL_AFTER_SECONDS = "20"
RADAR_GENERATION_GLOBAL_HOURLY_LIMIT = "20"
RADAR_GENERATION_VIEWPORT_HOURLY_LIMIT = "2"
RADAR_GENERATION_MAX_CANDIDATE_TILES = "220"
